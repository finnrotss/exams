{% extends 'posts/base.html' %}
{% block title %}Удаление поста{% endblock %}
{% block content %}
<h1>Удалить пост?</h1>
<p>Вы уверены, что хотите удалить «{{ object }}»?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'index' %}" class="btn btn-secondary">Нет, отмена</a>
</form>
{% endblock %}
